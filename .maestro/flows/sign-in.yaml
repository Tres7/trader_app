appId: com.traderapp.client
---
- evalScript: |
    http.delete("http://localhost:8080/api/v1/test/users/e2e.signin@test.com");
    http.post("http://localhost:8080/api/v1/test/seed-verified-user", {
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: "e2e.signin@test.com",
        password: "Password123!",
        firstName: "E2E",
        lastName: "Test",
        birthDate: "1990-01-01",
        country: "FR"
      })
    });
- launchApp
- extendedWaitUntil:
    visible:
      text: "Connexion"
    timeout: 120000
- tapOn:
    id: "sign-in-email-input"
- inputText: "e2e.signin@test.com"
- tapOn:
    id: "sign-in-password-input"
- inputText: "Password123!"
- tapOn:
    id: "sign-in-submit-button"
- assertVisible: "Bonjour, E2E"
