appId: com.traderapp.client
---
- evalScript: |
    http.delete("http://localhost:8080/api/v1/test/users/e2e.plan@test.com");
    http.post("http://localhost:8080/api/v1/test/seed-verified-user", {
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: "e2e.plan@test.com",
        password: "Password123!",
        firstName: "E2E",
        lastName: "Plan",
        birthDate: "1990-01-01",
        country: "FR"
      })
    });
- launchApp
- tapOn:
    id: "sign-in-email-input"
- inputText: "e2e.plan@test.com"
- tapOn:
    id: "sign-in-password-input"
- inputText: "Password123!"
- tapOn:
    id: "sign-in-submit-button"
- assertVisible: "Mon Plan de Trading"
- tapOn: "Style de trading"
- tapOn:
    id: "plan-section-edit-STYLE_TRADING"
- tapOn:
    id: "plan-editor-value-input"
- clearText
- inputText: "Trend following avec confirmation sur retracements"
- tapOn:
    id: "plan-editor-confirm-button"
- tapOn:
    id: "plan-save-button"
- assertVisible: "Enregistrer le plan"
