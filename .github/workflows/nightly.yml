name: Nightly

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Audit
        run: npm audit --audit-level=high
        working-directory: client

  trivy:
    name: Trivy (production image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Find latest manifest
        id: manifest
        run: |
          LATEST=$(find deploy/manifests -maxdepth 1 -name 'manifest-*.yaml' | sed -E 's/.*manifest-([0-9]+\.[0-9]+\.[0-9]+)\.yaml/\1/' | sort -V | tail -1)
          echo "path=deploy/manifests/manifest-${LATEST}.yaml" >> "$GITHUB_OUTPUT"

      - name: Extract image reference
        id: image
        run: |
          IMAGE=$(grep 'image:' "${{ steps.manifest.outputs.path }}" | awk '{print $2}')
          echo "ref=$IMAGE" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
