name: Backend checks

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: backend-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v5

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - 'server/**'
              - 'compose.yaml'

  unit-tests:
    name: Unit tests
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
        working-directory: server

      - name: Run unit tests
        run: ./gradlew unitTest
        working-directory: server

  integration-tests:
    name: Integration tests
    needs: [changes, unit-tests]
    if: needs.changes.outputs.server == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
        working-directory: server

      - name: Run integration tests
        run: ./gradlew integrationTest
        working-directory: server

  hadolint:
    name: Hadolint
    needs: changes
    if: needs.changes.outputs.server == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check if Dockerfile changed
        id: dockerfile
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dockerfile:
              - 'server/Dockerfile'

      - name: Run Hadolint
        if: steps.dockerfile.outputs.dockerfile == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: server/Dockerfile

  compose-config:
    name: docker compose config
    needs: changes
    if: needs.changes.outputs.server == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Prepare env file for validation
        run: cp server/.env.example server/.env

      - name: Validate compose file
        run: docker compose -f compose.yaml config --quiet
