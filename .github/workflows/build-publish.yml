name: Build & Publish

on:
  workflow_run:
    workflows:
      - E2E Tests
    types:
      - completed
    branches:
      - main

concurrency:
  group: build-publish-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changes
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Find last published commit
        id: last_published
        run: |
          LAST_MANIFEST=$(find deploy/manifests -maxdepth 1 -name 'manifest-*.yaml' 2>/dev/null | sed -E 's/.*manifest-([0-9]+\.[0-9]+\.[0-9]+)\.yaml/\1/' | sort -V | tail -1)
          if [ -z "$LAST_MANIFEST" ]; then
            echo "sha=" >> "$GITHUB_OUTPUT"
          else
            SHA=$(grep 'sourceRevision:' "deploy/manifests/manifest-${LAST_MANIFEST}.yaml" | awk '{print $2}')
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if server changed since last publish
        id: filter
        run: |
          BASE="${{ steps.last_published.outputs.sha }}"
          if [ -z "$BASE" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi
          if git diff --name-only "$BASE" HEAD | grep -q '^server/'; then
            echo "server=true" >> "$GITHUB_OUTPUT"
          else
            echo "server=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build & push server image
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/server" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.event.workflow_run.head_sha }}

  update-manifest:
    name: Update deployment manifest
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.CD_APP_ID }}
          private-key: ${{ secrets.CD_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Update manifest
        id: manifest
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image }}@${{ needs.build-and-push.outputs.digest }}"
          VERSION=$(bash .github/scripts/update-manifest.sh "${{ github.event.workflow_run.head_sha }}" "$IMAGE")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push manifest
        run: |
          git config user.name "traderapp-cd-bot[bot]"
          git config user.email "traderapp-cd-bot[bot]@users.noreply.github.com"
          git add deploy/manifests/
          git commit -m "chore(manifest): publish manifest-${{ steps.manifest.outputs.version }}"
          git push origin HEAD:main
