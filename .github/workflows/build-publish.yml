name: Build & Publish

on:
  workflow_run:
    workflows:
      - E2E Tests
    types:
      - completed
    branches:
      - main

concurrency:
  group: build-publish-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changes
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Check if server changed
        id: filter
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^server/'; then
            echo "server=true" >> "$GITHUB_OUTPUT"
          else
            echo "server=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build & push server image
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/server" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.event.workflow_run.head_sha }}
